<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexus — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Outfit',sans-serif;}
:root{
  --bg:#080810;--surface:#0E0E1A;--card:#14141F;--border:#1E1E30;
  --hover:#1A1A28;--active:#20203A;--input:#111120;
  --accent:#7C6AF7;--accent-dim:#5B4FD4;--accent-glow:rgba(124,106,247,.2);
  --accent2:#F06292;--text:#E8E6FF;--muted:#8B87B8;--dim:#3E3B5C;
  --online:#34D399;--away:#FBBF24;--busy:#F87171;
}
body{background:var(--bg);color:var(--text);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--active);}
input,textarea,button{font-family:'Outfit',sans-serif;}
input:focus,textarea:focus{outline:none;}
button:focus{outline:none;}

/* ── Layout ── */
#app{display:flex;height:100vh;overflow:hidden;}
#rail{width:58px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:3px;flex-shrink:0;z-index:10;}
#sidebar{width:282px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .32s cubic-bezier(.4,0,.2,1);}
#sidebar.collapsed{width:0;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);}
#profile-panel{width:300px;min-width:300px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;animation:slideRight .28s ease;}
#profile-panel.hidden{display:none;}

/* ── Rail ── */
#logo{width:38px;height:38px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:8px;cursor:pointer;box-shadow:0 4px 20px rgba(124,106,247,.4);transition:transform .2s;flex-shrink:0;}
#logo:hover{transform:scale(1.08);}
.rail-sep{width:30px;height:1px;background:var(--border);margin:4px 0;flex-shrink:0;}
.rail-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0;border:1.5px solid transparent;letter-spacing:-.02em;}
.rail-av.active{transform:scale(1.08);}
.rail-av .unread-dot{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:var(--accent2);border:2px solid var(--surface);font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;animation:unreadPop .4s cubic-bezier(.34,1.56,.64,1);}
#theme-btn{width:32px;height:32px;border-radius:9px;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--muted);margin-bottom:6px;flex-shrink:0;}
#theme-btn:hover{background:var(--hover);color:var(--text);}
#theme-menu{position:absolute;bottom:60px;left:66px;width:170px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:8px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:200;animation:popIn .2s ease;}
#theme-menu.hidden{display:none;}
.theme-opt{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;background:none;border:none;border-radius:9px;cursor:pointer;color:var(--text);font-size:13px;transition:background .1s;}
.theme-opt:hover{background:var(--hover);}
.theme-opt.active{background:var(--active);}

/* ── Sidebar ── */
#sb-inner{width:282px;height:100%;display:flex;flex-direction:column;overflow:hidden;}
#sb-head{padding:14px 14px 10px;flex-shrink:0;}
#sb-title{font-weight:900;font-size:16px;letter-spacing:-.04em;color:var(--text);}
#sb-subtitle{font-size:10.5px;color:var(--dim);margin-top:1px;}
.sb-actions{display:flex;gap:3px;}
.sb-icon-btn{position:relative;background:none;border:none;color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;}
.sb-icon-btn:hover{background:var(--hover);color:var(--text);}
.notif-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:var(--accent2);}
#search-bar{display:flex;align-items:center;gap:8px;background:var(--input);border:1px solid var(--border);border-radius:12px;padding:9px 12px;cursor:pointer;transition:border-color .2s;margin-top:12px;}
#search-bar:hover{border-color:rgba(124,106,247,.5);}
#search-bar span{color:var(--dim);font-size:13px;}
#sb-tabs{display:flex;padding:0 10px 8px;gap:3px;flex-shrink:0;flex-wrap:wrap;}
.sb-tab{padding:5px 10px;border-radius:20px;border:none;cursor:pointer;font-size:11.5px;font-weight:700;white-space:nowrap;transition:all .2s;font-family:'Outfit',sans-serif;}
.sb-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(124,106,247,.4);}
.sb-tab:not(.active){background:var(--card);color:var(--muted);}
#conv-list{flex:1;overflow-y:auto;padding:0 8px 4px;}
.conv-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:14px;cursor:pointer;margin-bottom:1px;transition:all .16s;border:1px solid transparent;}
.conv-item:hover:not(.active){background:var(--hover);border-color:var(--border);}
.conv-item.active{background:rgba(124,106,247,.12);border-color:rgba(124,106,247,.25);}
.conv-name{font-size:13.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;letter-spacing:-.02em;}
.conv-item.active .conv-name{font-weight:700;}
.conv-preview{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:3px;}
.conv-time{font-size:10.5px;color:var(--dim);flex-shrink:0;}
.unread-badge{background:linear-gradient(135deg,var(--accent),var(--accent-dim));border-radius:20px;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;color:#fff;padding:0 5px;flex-shrink:0;animation:unreadPop .4s cubic-bezier(.34,1.56,.64,1);}
#online-strip{padding:10px 14px 8px;border-top:1px solid var(--border);flex-shrink:0;}
#online-label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
#online-avs{display:flex;align-items:center;}
#user-footer{padding:10px 12px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
#footer-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.02em;}
#footer-status{font-size:11px;color:var(--online);display:flex;align-items:center;gap:3px;margin-top:1px;}
#footer-dot{width:6px;height:6px;border-radius:50%;background:var(--online);animation:onlinePulse 2.5s ease infinite;}

/* ── Chat header ── */
#chat-header{height:58px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;}
#toggle-sb{background:none;border:none;color:var(--muted);cursor:pointer;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;}
#toggle-sb:hover{background:var(--hover);color:var(--text);}
#chat-name{font-weight:700;font-size:14.5px;color:var(--text);letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#chat-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:1px;}
.h-btn{background:none;border:none;color:var(--muted);cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0;}
.h-btn:hover{background:var(--hover);color:var(--text);}
.h-btn.active-btn{background:rgba(124,106,247,.18);border:1px solid rgba(124,106,247,.35);color:var(--accent);}
#msg-search-bar{display:flex;align-items:center;gap:8px;background:var(--input);border:1px solid var(--border);border-radius:10px;padding:7px 12px;transition:border-color .2s;}
#msg-search-bar:focus-within{border-color:rgba(124,106,247,.5);}
#msg-search-bar input{background:none;border:none;color:var(--text);font-size:13px;width:150px;}
#msg-search-bar.hidden{display:none;}

/* ── Messages ── */
#messages{flex:1;overflow-y:auto;padding:16px 0;}
.conv-hero{padding:0 16px 20px;text-align:center;}
.hero-name{font-weight:800;font-size:18px;color:var(--text);letter-spacing:-.03em;margin-top:12px;}
.hero-sub{font-size:12px;color:var(--dim);margin-top:6px;}
.date-sep{display:flex;align-items:center;gap:12px;padding:6px 20px;margin-bottom:6px;}
.date-sep .line{flex:1;height:1px;background:var(--border);}
.date-sep .label{font-size:11px;color:var(--dim);font-weight:700;letter-spacing:.06em;}
.new-sep{display:flex;align-items:center;gap:12px;padding:6px 20px;margin-bottom:6px;}
.new-sep .line{flex:1;height:1px;background:rgba(124,106,247,.45);}
.new-sep .label{font-size:11px;color:var(--accent);font-weight:800;letter-spacing:.07em;background:rgba(124,106,247,.15);padding:3px 12px;border-radius:20px;}
.msg-row{display:flex;align-items:flex-end;gap:9px;padding:2px 16px;position:relative;}
.msg-row.me{flex-direction:row-reverse;}
.msg-row.mt-big{margin-top:10px;}
.msg-row.mt-small{margin-top:1px;}
.msg-av-slot{width:34px;flex-shrink:0;align-self:flex-end;}
.msg-col{max-width:65%;display:flex;flex-direction:column;min-width:0;}
.msg-row.me .msg-col{align-items:flex-end;}
.msg-row:not(.me) .msg-col{align-items:flex-start;}
.sender-name{font-size:11.5px;font-weight:700;margin-bottom:4px;margin-left:2px;letter-spacing:.02em;}
.reply-preview{background:var(--bg);border-radius:8px 8px 0 0;padding:6px 10px;font-size:11.5px;color:var(--muted);margin-bottom:-2px;border-left:3px solid var(--accent);max-width:100%;}
.reply-from{color:var(--accent);font-weight:700;font-size:11px;margin-bottom:2px;}
.bubble{padding:10px 14px;word-break:break-word;position:relative;transition:filter .12s;font-size:14px;line-height:1.55;}
.bubble:hover{filter:brightness(1.08);}
.bubble.me{background:linear-gradient(135deg,var(--accent),var(--accent-dim));color:#fff;border-radius:18px 3px 18px 18px;}
.bubble.me.has-reply{border-radius:14px 3px 14px 14px;}
.bubble.them{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:3px 18px 18px 18px;}
.bubble.them.has-reply{border-radius:3px 14px 14px 14px;}
.bubble.emoji-big{background:transparent!important;border:none!important;font-size:36px;padding:4px 2px;line-height:1.2;}
.bubble.deleted{background:var(--card)!important;color:var(--dim)!important;font-style:italic;border:1px dashed var(--border)!important;border-radius:12px!important;}
.msg-meta{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10.5px;}
.msg-meta.me{justify-content:flex-end;color:rgba(255,255,255,.5);}
.msg-meta.them{justify-content:flex-start;color:var(--dim);}
.reactions{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.reaction-chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 8px;font-size:12px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:3px;transition:border-color .15s;}
.reaction-chip:hover{border-color:var(--accent);}
.reaction-cnt{font-size:11px;color:var(--muted);font-weight:600;}
.msg-actions{display:none;gap:2px;align-items:center;}
.msg-row:hover .msg-actions{display:flex;}
.msg-row.me .msg-actions{margin-right:4px;}
.msg-row:not(.me) .msg-actions{margin-left:4px;}
.act-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .1s;color:var(--muted);}
.act-btn:hover{background:var(--hover);color:var(--text);transform:scale(1.15);}
.voice-bubble{display:flex;align-items:center;gap:12px;min-width:200px;}
.play-btn{width:32px;height:32px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.waveform{display:flex;align-items:center;gap:2px;height:28px;flex:1;}
.wave-bar{width:3px;border-radius:3px;background:var(--accent);opacity:.4;transition:opacity .3s;}
.voice-dur{font-size:11px;color:var(--muted);flex-shrink:0;}
.typing-row{display:flex;gap:10px;align-items:flex-end;padding:6px 16px 0;animation:msgIn .2s ease;}
.typing-bubble{background:var(--card);border-radius:3px 18px 18px 18px;border:1px solid var(--border);padding:12px 16px;display:flex;gap:3px;align-items:center;}
.t-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}

/* ── Context Menu ── */
#ctx-menu{position:fixed;width:196px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:1000;padding:6px;animation:popIn .15s ease;}
#ctx-menu.hidden{display:none;}
.ctx-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;background:none;border:none;border-radius:10px;cursor:pointer;color:var(--text);font-size:13px;transition:background .12s;text-align:left;}
.ctx-item:hover{background:var(--hover);}
.ctx-item.danger{color:var(--busy);}
.ctx-item.danger:hover{background:#2D1010;}
.ctx-sep{height:1px;background:var(--border);margin:4px 0;}

/* ── Input ── */
#input-area{padding:10px 18px 14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;position:relative;}
.banner{display:flex;align-items:center;gap:8px;padding:8px 12px;margin-bottom:8px;background:var(--card);border-radius:10px;}
.banner.reply-banner{border-left:3px solid var(--accent);}
.banner.edit-banner{border-left:3px solid var(--away,#FBBF24);}
.banner.hidden{display:none;}
.banner-text{font-size:12px;flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.banner-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;flex-shrink:0;}
#voice-ui{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:18px;padding:10px 16px;border:1px solid var(--border);}
#voice-ui.hidden{display:none;}
#rec-dot{width:10px;height:10px;border-radius:50%;background:#EF4444;animation:recordPulse 1s ease infinite;flex-shrink:0;}
#voice-waveform{display:flex;align-items:center;gap:2px;height:28px;flex:1;}
#voice-timer{font-size:13px;color:var(--muted);font-family:monospace;flex-shrink:0;}
#voice-cancel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;}
#voice-send{background:var(--accent);border:none;border-radius:12px;padding:8px 16px;color:#fff;cursor:pointer;font-size:13px;font-weight:700;}
#input-row{display:flex;gap:8px;align-items:flex-end;}
#input-row.hidden{display:none;}
.tool-btn-sm{background:none;border:none;color:var(--muted);cursor:pointer;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;flex-shrink:0;}
.tool-btn-sm:hover{background:var(--hover);color:var(--text);}
#input-wrap{flex:1;background:var(--input);border-radius:18px;border:1px solid var(--border);display:flex;align-items:flex-end;gap:4px;padding:8px 12px;transition:border-color .2s,box-shadow .2s;}
#input-wrap:focus-within{border-color:rgba(124,106,247,.6);box-shadow:0 0 0 3px rgba(124,106,247,.12);}
#msg-input{flex:1;background:none;border:none;color:var(--text);font-size:14px;resize:none;line-height:1.6;padding:2px 0;max-height:120px;overflow-y:auto;}
#emoji-toggle{background:none;border:none;cursor:pointer;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--muted);transition:all .15s;flex-shrink:0;}
#emoji-toggle:hover,#emoji-toggle.active{background:rgba(124,106,247,.2);color:var(--accent);}
#send-btn{width:42px;height:42px;border-radius:14px;flex-shrink:0;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;background:var(--card);}
#send-btn.ready{background:linear-gradient(135deg,var(--accent),var(--accent-dim));border-color:transparent;box-shadow:0 4px 18px rgba(124,106,247,.45);transform:scale(1);}
#send-btn:not(.ready){transform:scale(.94);cursor:not-allowed;}
#input-hint{text-align:center;margin-top:6px;font-size:10px;color:var(--dim);}
#input-hint kbd{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:0 4px;font-size:9px;}

/* ── Emoji Picker ── */
#emoji-picker{position:absolute;bottom:calc(100% + 10px);right:18px;width:330px;background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.55);z-index:300;animation:popIn .22s cubic-bezier(.34,1.56,.64,1);}
#emoji-picker.hidden{display:none;}
#ep-search-wrap{padding:10px 12px 6px;border-bottom:1px solid var(--border);}
#ep-search{display:flex;align-items:center;gap:8px;background:var(--input);border-radius:10px;padding:7px 12px;border:1px solid var(--border);}
#ep-search input{background:none;border:none;color:var(--text);font-size:13px;width:100%;}
#ep-cats{display:flex;border-bottom:1px solid var(--border);}
.ep-cat{flex:1;padding:10px 4px;background:none;border:none;cursor:pointer;font-size:18px;transition:background .15s;border-bottom:2px solid transparent;}
.ep-cat.active{background:var(--active);border-bottom:2px solid var(--accent);}
#ep-grid{padding:8px;display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:200px;overflow-y:auto;}
.ep-emoji{background:none;border:none;cursor:pointer;font-size:22px;padding:4px;border-radius:8px;transition:background .1s,transform .1s;line-height:1;}
.ep-emoji:hover{background:var(--hover);transform:scale(1.15);}

/* ── Slash menu ── */
#slash-menu{position:absolute;bottom:calc(100% + 6px);left:18px;width:260px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:200;padding:6px;animation:popIn .18s ease;}
#slash-menu.hidden{display:none;}
.slash-head{font-size:10px;color:var(--dim);padding:4px 8px 6px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.slash-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;background:none;border:none;border-radius:10px;cursor:pointer;transition:background .1s;}
.slash-item:hover,.slash-item.selected{background:var(--hover);}
.slash-cmd{font-size:13px;font-weight:600;color:var(--text);}
.slash-desc{font-size:11px;color:var(--muted);}

/* ── Search modal ── */
#search-modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding-top:10vh;animation:fadeIn .15s ease;}
#search-modal.hidden{display:none;}
#search-box{width:100%;max-width:560px;background:var(--surface);border-radius:20px;border:1px solid var(--border);box-shadow:0 24px 80px rgba(0,0,0,.6);overflow:hidden;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);}
#search-input-row{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);}
#search-input-row input{flex:1;background:none;border:none;color:var(--text);font-size:15px;}
.sm-tab{flex:1;padding:10px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;font-weight:600;border-bottom:2px solid transparent;transition:all .15s;text-transform:capitalize;}
.sm-tab.active{color:var(--accent);border-bottom:2px solid var(--accent);}
#search-results{max-height:360px;overflow-y:auto;padding:8px;}
.sr-item{display:flex;align-items:center;gap:12px;width:100%;padding:10px 12px;background:none;border:none;border-radius:12px;cursor:pointer;transition:background .12s;}
.sr-item:hover{background:var(--hover);}
.sr-name{font-size:14px;font-weight:600;color:var(--text);text-align:left;}
.sr-preview{font-size:12px;color:var(--muted);text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sr-time{font-size:11px;color:var(--dim);flex-shrink:0;}
#search-footer{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:16px;}
#search-footer kbd{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:11px;color:var(--muted);}
#search-footer span{font-size:11px;color:var(--dim);}

/* ── Profile panel ── */
#pp-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;}
#pp-hero{padding:28px 20px 20px;text-align:center;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;overflow:hidden;}
#pp-hero-bg{position:absolute;top:0;left:0;right:0;height:60px;z-index:0;}
.pp-hero-content{position:relative;z-index:1;}
#pp-name{font-weight:800;font-size:17px;color:var(--text);letter-spacing:-.03em;margin-top:14px;}
#pp-handle{font-size:12.5px;color:var(--muted);margin-top:3px;}
#pp-role{font-size:12px;color:var(--muted);margin-top:2px;}
#pp-status{font-size:12px;margin-top:5px;display:flex;align-items:center;justify-content:center;gap:4px;}
#pp-tz{font-size:11px;color:var(--dim);margin-top:3px;}
.pp-btns{display:flex;gap:8px;justify-content:center;margin-top:16px;}
.pp-btn-wrap{text-align:center;}
.pp-action-btn{width:42px;height:42px;border-radius:13px;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;margin:0 auto;}
.pp-action-btn:hover{background:var(--hover);}
.pp-action-lbl{font-size:10px;color:var(--muted);margin-top:4px;}
#pp-sec-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.pp-tab{flex:1;padding:10px 4px;background:none;border:none;cursor:pointer;font-size:16px;transition:all .15s;border-bottom:2px solid transparent;}
.pp-tab.active{background:var(--active);border-bottom:2px solid var(--accent);}
#pp-content{flex:1;overflow-y:auto;padding:16px;}
.pp-section-label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.pp-bio-box{font-size:13px;color:var(--muted);line-height:1.6;background:var(--card);border-radius:10px;padding:10px 12px;}
.pp-action-list button{width:100%;background:none;border:none;padding:9px 10px;border-radius:10px;cursor:pointer;color:var(--muted);font-size:13px;text-align:left;display:flex;align-items:center;gap:8px;transition:background .12s;}
.pp-action-list button:hover{background:var(--hover);}
.pp-action-list button.danger{color:var(--busy);}
.pp-action-list button.danger:hover{background:#2D1010;}
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.media-thumb{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .15s;}
.media-thumb:hover{transform:scale(1.04);}
.pinned-item{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;color:var(--muted);border-left:3px solid var(--accent);}
.pinned-from{color:var(--accent);font-weight:600;font-size:11px;margin-bottom:4px;}
.member-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:6px 8px;border-radius:10px;cursor:pointer;transition:background .12s;}
.member-row:hover{background:var(--hover);}
.member-name{font-size:13px;font-weight:600;color:var(--text);}
.member-role{font-size:11px;color:var(--muted);}
.empty-state{text-align:center;padding:32px 0;color:var(--dim);font-size:13px;}
.empty-icon{font-size:28px;margin-bottom:8px;}

/* ── Toast ── */
#toast-container{position:fixed;bottom:28px;right:28px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none;}
.toast{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 16px;color:var(--text);font-size:13px;pointer-events:auto;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.45);animation:toastSlide .35s cubic-bezier(.34,1.56,.64,1);max-width:320px;}
.toast-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;flex-shrink:0;}

/* ── Avatar ── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;letter-spacing:-.02em;flex-shrink:0;position:relative;}
.av.group{border-radius:28%;}
.av-dot{position:absolute;bottom:1px;right:1px;border-radius:50%;border:2px solid var(--bg);}

/* ── Animations ── */
@keyframes onlinePulse{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.5);}50%{box-shadow:0 0 0 4px rgba(52,211,153,.1);}}
@keyframes typBounce{0%,60%,100%{transform:translateY(0);opacity:.35;}30%{transform:translateY(-5px);opacity:1;}}
@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes slideRight{from{opacity:0;transform:translateX(28px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastSlide{from{opacity:0;transform:translateX(30px) scale(.95);}to{opacity:1;transform:translateX(0) scale(1);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes unreadPop{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
@keyframes recordPulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes waveAnim{0%{height:20%;}100%{height:100%;}}
.msg-anim{animation:msgIn .26s cubic-bezier(.34,1.56,.64,1) both;}

function getEntity(id){
  if(id==="me") return ME;
  return USERS.find(u=>u.id===id)||GROUPS.find(g=>g.id===id);
}
function statusColor(status){
  const t=THEMES[currentTheme];
  return status==="online"?t.online:status==="away"?t.away:status==="busy"?t.busy:"#555";
}
function getLastMsg(msgs){
  const m=[...msgs].reverse().find(m=>!m.deleted);
  if(!m) return {text:"Start a conversation",time:""};
  const s=m.from==="me"?"You":(getEntity(m.from)?.name?.split(" ")[0]||"");
  return {text:s?`${s}: ${m.text}`:m.text,time:m.time};
}

/* ═══════════════════════════════════════
   THEME
═══════════════════════════════════════ */
function applyTheme(name){
  currentTheme=name;
  const t=THEMES[name];
  const r=document.documentElement.style;
  r.setProperty("--bg",t.bg);
  r.setProperty("--surface",t.surface);
  r.setProperty("--card",t.card);
  r.setProperty("--border",t.border);
  r.setProperty("--hover",t.hover);
  r.setProperty("--active",t.active);
  r.setProperty("--input",t.input);
  r.setProperty("--accent",t.accent);
  r.setProperty("--accent-dim",t.accentDim);
  r.setProperty("--accent-glow",t.accent+"33");
  r.setProperty("--text",t.text);
  r.setProperty("--muted",t.muted);
  r.setProperty("--dim",t.dim);
  r.setProperty("--online",t.online);
  r.setProperty("--away",t.away);
  r.setProperty("--busy",t.busy);
  renderThemeMenu();
}

function renderThemeMenu(){
  const menu=document.getElementById("theme-menu");
  menu.innerHTML='<div style="font-size:10px;color:var(--dim);padding:2px 8px 6px;font-weight:700;letter-spacing:.1em;text-transform:uppercase">Theme</div>';
  Object.entries(THEMES).forEach(([key,th])=>{
    const btn=document.createElement("button");
    btn.className="theme-opt"+(currentTheme===key?" active":"");
    btn.innerHTML=`${th.emoji} ${th.name}${currentTheme===key?'<span style="margin-left:auto;color:var(--accent)">✓</span>':""}`;
    btn.style.cssText="display:flex;align-items:center;gap:10px;";
    btn.onclick=()=>{applyTheme(key);document.getElementById("theme-menu").classList.add("hidden");renderAll();};
    menu.appendChild(btn);
  });
  document.getElementById("theme-btn").onclick=()=>{
    document.getElementById("theme-menu").classList.toggle("hidden");
  };
}

/* ═══════════════════════════════════════
   AVATAR HELPERS
═══════════════════════════════════════ */
function makeAv(id,size=36,showDot=true,ring=false){
  const e=getEntity(id);
  if(!e) return document.createElement("div");
  const sc=statusColor(e.status);
  const div=document.createElement("div");
  div.className="av"+(e.isGroup?" group":"");
  div.style.cssText=`width:${size}px;height:${size}px;font-size:${Math.round(size*.32)}px;color:${e.color};background:${e.color}20;border:${ring?2:1.5}px solid ${e.color}${ring?"":"55"};${ring?`box-shadow:0 0 0 3px ${e.color}40,0 4px 16px ${e.color}25`:`box-shadow:0 2px 8px ${e.color}20`};`;
  div.textContent=e.avatar;
  if(showDot&&!e.isGroup&&e.status){
    const ds=Math.max(8,size*.26);
    const dot=document.createElement("div");
    dot.className="av-dot";
    dot.style.cssText=`width:${ds}px;height:${ds}px;background:${sc};bottom:${ring?2:1}px;right:${ring?2:1}px;border-width:${size<32?1.5:2}px;${e.status==="online"?"animation:onlinePulse 2.5s ease infinite":""}`;
    div.appendChild(dot);
  }
  return div;
}

/* ═══════════════════════════════════════
   RENDER SIDEBAR
═══════════════════════════════════════ */
function renderSidebar(){
  // subtitle
  const online=USERS.filter(u=>u.status==="online").length;
  document.getElementById("sb-subtitle").textContent=`${online+1} online · ${GROUPS.length} groups`;

  // tabs
  const tabs=[
    {id:"all",label:"All"},
    {id:"dms",label:"DMs"},
    {id:"groups",label:"Groups"},
    {id:"pinned",label:"📌"},
    {id:"unread",label:`Unread${getTotalUnread()>0?" · "+getTotalUnread():""}`},
  ];
  const tabsEl=document.getElementById("sb-tabs");
  tabsEl.innerHTML="";
  tabs.forEach(tab=>{
    const btn=document.createElement("button");
    btn.className="sb-tab"+(sidebarTab===tab.id?" active":"");
    btn.textContent=tab.label;
    btn.onclick=()=>{sidebarTab=tab.id;renderSidebar();};
    tabsEl.appendChild(btn);
  });

  // conv list
  const list=document.getElementById("conv-list");
  list.innerHTML="";
  const filtered=getFilteredConvs();
  if(filtered.length===0){
    list.innerHTML='<div style="padding:36px 16px;text-align:center;color:var(--dim);font-size:13px"><div style="font-size:32px;margin-bottom:8px">💬</div>Nothing here</div>';
    return;
  }
  filtered.forEach(conv=>{
    const e=getEntity(conv.id);
    if(!e) return;
    const isAct=activeId===conv.id;
    const lm=getLastMsg(messages[conv.id]||[]);
    const isTyping=typingMap[conv.id];
    const item=document.createElement("div");
    item.className="conv-item"+(isAct?" active":"");
    item.onclick=()=>selectConv(conv.id);

    const avSlot=document.createElement("div");
    avSlot.appendChild(makeAv(conv.id,42,!e.isGroup));
    item.appendChild(avSlot);

    const info=document.createElement("div");
    info.style.cssText="flex:1;min-width:0;";
    const top=document.createElement("div");
    top.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;";

    const name=document.createElement("div");
    name.className="conv-name";
    name.textContent=(e.isGroup?"# ":"")+e.name;
    top.appendChild(name);

    const meta=document.createElement("div");
    meta.style.cssText="display:flex;align-items:center;gap:3px;flex-shrink:0;margin-left:4px;";
    if(conv.pinned) meta.innerHTML+='<span style="font-size:9px;color:var(--dim)">📌</span>';
    if(conv.muted) meta.innerHTML+='<span style="font-size:9px;color:var(--dim)">🔇</span>';
    const timeEl=document.createElement("span");
    timeEl.className="conv-time";
    timeEl.textContent=lm.time;
    meta.appendChild(timeEl);
    top.appendChild(meta);
    info.appendChild(top);

    const preview=document.createElement("div");
    preview.className="conv-preview";
    if(isTyping){
      preview.style.color="var(--accent)";
      const dots=document.createElement("div");
      dots.style.cssText="display:flex;gap:2px;align-items:center;";
      [0,1,2].forEach(i=>{
        const d=document.createElement("div");
        d.className="t-dot";
        d.style.cssText=`width:4px;height:4px;border-radius:50%;animation:typBounce 1s ease ${i*.15}s infinite`;
        dots.appendChild(d);
      });
      preview.appendChild(dots);
      const txt=document.createElement("span");
      txt.textContent=" typing…";
      txt.style.fontStyle="italic";
      preview.appendChild(txt);
    } else {
      preview.textContent=lm.text;
    }
    info.appendChild(preview);
    item.appendChild(info);

    if(conv.unread>0&&!conv.muted){
      const badge=document.createElement("div");
      badge.className="unread-badge";
      badge.textContent=conv.unread>9?"9+":conv.unread;
      item.appendChild(badge);
    } else if(conv.unread>0&&conv.muted){
      const dot=document.createElement("div");
      dot.style.cssText="width:8px;height:8px;border-radius:50%;background:var(--dim);flex-shrink:0";
      item.appendChild(dot);
    }
    list.appendChild(item);
  });

  // notif dot
  document.getElementById("notif-dot").style.display=getTotalUnread()>0?"block":"none";

  // online strip
  document.getElementById("online-label").textContent=`Online · ${online}`;
  const onlineAvs=document.getElementById("online-avs");
  onlineAvs.innerHTML="";
  USERS.filter(u=>u.status==="online").forEach((u,i)=>{
    const wrap=document.createElement("div");
    wrap.style.cssText=`margin-left:${i>0?"-8px":"0"};z-index:${10-i}`;
    wrap.appendChild(makeAv(u.id,26,false));
    onlineAvs.appendChild(wrap);
  });

  // rail avatars
  const railAvs=document.getElementById("rail-avatars");
  railAvs.innerHTML="";
  railAvs.style.cssText="display:flex;flex-direction:column;align-items:center;gap:3px;";
  [...GROUPS,...USERS].slice(0,6).forEach(entity=>{
    const isAct=activeId===entity.id;
    const unrd=convs.find(c=>c.id===entity.id)?.unread||0;
    const btn=document.createElement("button");
    btn.className="rail-av"+(entity.isGroup?" group":"")+(isAct?" active":"");
    btn.style.cssText=`background:${entity.color}${isAct?"25":"12"};color:${entity.color};border-color:${entity.color}${isAct?"":"44"};border-width:${isAct?2:1.5}px;border-style:solid;${isAct?`box-shadow:0 0 0 3px ${entity.color}35,0 4px 16px ${entity.color}25`:""}`;
    btn.textContent=entity.avatar;
    btn.onclick=()=>selectConv(entity.id);
    if(unrd>0){
      const dot=document.createElement("div");
      dot.className="unread-dot";
      dot.textContent=unrd>9?"9+":unrd;
      btn.appendChild(dot);
    }
    railAvs.appendChild(btn);
  });

  // footer avatar
  const fav=document.getElementById("footer-av");
  fav.innerHTML="";
  fav.appendChild(makeAv("me",36,true));

  // rail me
  const rme=document.getElementById("rail-me");
  rme.innerHTML="";
  rme.appendChild(makeAv("me",32,true));
}

function getFilteredConvs(){
  return convs.filter(c=>{
    if(sidebarTab==="pinned") return c.pinned;
    if(sidebarTab==="unread") return c.unread>0;
    if(sidebarTab==="groups") return c.id.startsWith("g");
    if(sidebarTab==="dms") return !c.id.startsWith("g");
    return true;
  });
}

function getTotalUnread(){ return convs.reduce((s,c)=>s+c.unread,0); }

function renderHeader(){

  if(!e) return;
  const hav=document.getElementById("header-av");
  hav.innerHTML="";
  hav.appendChild(makeAv(activeId,36,!e.isGroup));

  document.getElementById("chat-name").textContent=(e.isGroup?"# ":"")+e.name;

  const status=document.getElementById("chat-status");
  status.innerHTML="";
  if(typingMap[activeId]){
    status.style.color="var(--accent)";
    const dots=document.createElement("div");
    dots.style.cssText="display:flex;align-items:center;gap:5px;";
    [0,1,2].forEach(i=>{
      const d=document.createElement("div");
      d.style.cssText=`width:5px;height:5px;border-radius:50%;background:var(--accent);animation:typBounce 1s ease ${i*.15}s infinite`;
      dots.appendChild(d);
    });
    dots.appendChild(Object.assign(document.createElement("span"),{textContent:" typing…",style:"font-style:italic"}));
    status.appendChild(dots);
  } else if(e.isGroup){
    status.style.color="var(--muted)";
    status.textContent=`${e.members.length+1} members · ${USERS.filter(u=>u.status==="online").length+1} online`;
  } else {
    status.style.color=statusColor(e.status);
    const dot=document.createElement("div");
    dot.style.cssText=`width:6px;height:6px;border-radius:50%;background:${statusColor(e.status)};flex-shrink:0`;
    status.appendChild(dot);
    const txt=document.createElement("span");
    txt.textContent=" "+(e.status==="online"?"Active now":e.status==="away"?"Away":"Offline");
    status.appendChild(txt);
  }

  const pb=document.getElementById("profile-btn");
  if(profileOpen){
    pb.style.background="rgba(124,106,247,.18)";
    pb.style.border="1px solid rgba(124,106,247,.35)";
    pb.style.color="var(--accent)";
  } else {
    pb.style.background="none";
    pb.style.border="none";
    pb.style.color="var(--muted)";
  }
}

    const empty=document.createElement("div");
    empty.style="display:flex;flex-direction:column;align-items:center;padding:60px 0;color:var(--dim);gap:10px;";
    empty.innerHTML='<div style="font-size:44px">💬</div><div style="font-size:15px;font-weight:600;color:var(--muted)">No messages yet</div><div style="font-size:13px">Say hello!</div>';
    el.appendChild(empty);
  }

  msgs.forEach((msg,idx)=>{
    const isMe=msg.from==="me";
    const prev=msgs[idx-1];
    const next=msgs[idx+1];
    const samePrev=prev&&prev.from===msg.from&&!prev.deleted;
    const sameNext=next&&next.from===msg.from&&!msg.deleted;
    el.appendChild(renderBubble(msg,isMe,samePrev,sameNext,idx));
  });

  // Typing
  if(typingMap[activeId]){
    const row=document.createElement("div");
    row.className="typing-row";
    const avSlot=document.createElement("div");
    avSlot.style.cssText="width:34px;flex-shrink:0;align-self:flex-end;";
    avSlot.appendChild(makeAv(activeId,32,false));
    row.appendChild(avSlot);
    const bubble=document.createElement("div");
    bubble.className="typing-bubble";
    [0,1,2].forEach(i=>{
      const d=document.createElement("div");
      d.className="t-dot";
      d.style.cssText=`animation:typBounce 1.1s ease ${i*.17}s infinite;width:6px;height:6px;border-radius:50%;`;
      bubble.appendChild(d);
    });
    row.appendChild(bubble);
    el.appendChild(row);
  }

  const endDiv=document.createElement("div");
  endDiv.style.height="12px";
  el.appendChild(endDiv);

  if(scrolledToBottom||msgs.length<=12){
    el.scrollTop=el.scrollHeight;
  }
}

function renderBubble(msg,isMe,samePrev,sameNext,idx){
  const showAv=!isMe&&!sameNext;
  const showName=!isMe&&!samePrev;
  const row=document.createElement("div");
  row.className=`msg-row${isMe?" me":""} ${samePrev?"mt-small":"mt-big"} msg-anim`;
  row.style.cssText=`animation-delay:${Math.min(idx*.012,.25)}s`;
  row.dataset.msgId=msg.id;

  // Deleted
  if(msg.deleted){
    const avSlot=document.createElement("div");
    avSlot.className="msg-av-slot";
    row.appendChild(avSlot);
    const wrap=document.createElement("div");
    wrap.innerHTML=`<div class="bubble deleted">🚫 Message deleted</div>`;
    row.appendChild(wrap);
    return row;
  }

  // Avatar slot
  const avSlot=document.createElement("div");
  avSlot.className="msg-av-slot";
  if(showAv&&!isMe) avSlot.appendChild(makeAv(msg.from,32,false));
  row.appendChild(avSlot);

  // Msg col
  const col=document.createElement("div");
  col.className="msg-col";

  if(showName&&!isMe){
    const sender=getEntity(msg.from);
    const sn=document.createElement("div");
    sn.className="sender-name";
    sn.style.color=sender?.color||"var(--accent)";
    sn.textContent=sender?.name||"";
    col.appendChild(sn);
  }

  // Reply preview
  if(msg.replyTo){
    const rp=document.createElement("div");
    rp.className="reply-preview";
    const rf=document.createElement("div");
    rf.className="reply-from";
    rf.textContent="↩ "+(msg.replyTo.from==="me"?"You":getEntity(msg.replyTo.from)?.name?.split(" ")[0]||"");
    rp.appendChild(rf);
    const rt=document.createElement("div");
    rt.textContent=msg.replyTo.text;
    rt.style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;";
    rp.appendChild(rt);
    if(isMe) rp.style.borderLeft="none";
    col.appendChild(rp);
  }

  // Bubble
  const isEmojiOnly=/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\s]+$/u.test(msg.text||"")&&(msg.text||"").trim().length<=4;
  const bubble=document.createElement("div");

  if(msg.type==="voice"){
    bubble.className=`bubble ${isMe?"me":"them"}`;
    bubble.innerHTML=`<div class="voice-bubble"><button class="play-btn">▶</button><div class="waveform">${Array.from({length:22},(_,i)=>`<div class="wave-bar" style="height:${20+Math.sin(i*.5)*50+30}%"></div>`).join("")}</div><span class="voice-dur">0:12</span></div>`;
    if(isMe) bubble.style.background="";
    const meta=document.createElement("div");
    meta.className="msg-meta "+(isMe?"me":"them");
    meta.textContent=msg.time;
    if(isMe) meta.innerHTML+=` <span>✓✓</span>`;
    col.appendChild(bubble);
    col.appendChild(meta);
  } else {
    bubble.className=`bubble ${isMe?"me":"them"}${isEmojiOnly?" emoji-big":""}${msg.replyTo?` has-reply`:""}`;
    bubble.textContent=msg.text||"";
    if(!isEmojiOnly){
      const meta=document.createElement("div");
      meta.className="msg-meta "+(isMe?"me":"them");
      if(msg.edited){
        const ed=document.createElement("span");
        ed.textContent="edited";
        ed.style="font-style:italic;margin-right:2px";
        meta.appendChild(ed);
      }
      if(msg.pinned){const p=document.createElement("span");p.textContent="📌";meta.appendChild(p);}
      const timeEl=document.createElement("span");
      timeEl.textContent=msg.time;
      meta.appendChild(timeEl);
      if(isMe){const c=document.createElement("span");c.textContent=" ✓✓";meta.appendChild(c);}
      col.appendChild(bubble);
      col.appendChild(meta);
    } else {
      col.appendChild(bubble);
    }
  }

  // Reactions
  if(Object.keys(msg.reactions).length>0){
    const reacts=document.createElement("div");
    reacts.className="reactions";
    Object.entries(msg.reactions).forEach(([emoji,count])=>{
      const chip=document.createElement("button");
      chip.className="reaction-chip";
      chip.innerHTML=`${emoji}<span class="reaction-cnt">${count}</span>`;
      chip.onclick=()=>{addReaction(msg.id,emoji);};
      reacts.appendChild(chip);
    });
    col.appendChild(reacts);
  }

  row.appendChild(col);

  // Quick actions on hover
  const actions=document.createElement("div");
  actions.className="msg-actions";
  const quickEmojis=["👍","❤️","😂","🔥","🎉"];
  quickEmojis.forEach(e=>{
    const btn=document.createElement("button");
    btn.className="act-btn";
    btn.textContent=e;
    btn.onclick=()=>addReaction(msg.id,e);
    actions.appendChild(btn);
  });
  const replyBtn=document.createElement("button");
  replyBtn.className="act-btn";
  replyBtn.title="Reply";
  replyBtn.textContent="↩";
  replyBtn.onclick=()=>setReply(msg);
  actions.appendChild(replyBtn);
  if(isMe){
    const editBtn=document.createElement("button");
    editBtn.className="act-btn";
    editBtn.title="Edit";
    editBtn.textContent="✏️";
    editBtn.onclick=()=>startEdit(msg);
    actions.appendChild(editBtn);
  }
  row.appendChild(actions);

  // Right-click context menu
  row.oncontextmenu=(ev)=>{
    ev.preventDefault();
    showContextMenu(ev.clientX,ev.clientY,msg,isMe);
  };

  return row;
}

/* ═══════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════ */
function showContextMenu(x,y,msg,isMe){
  const menu=document.getElementById("ctx-menu");
  menu.innerHTML="";
  const items=[
    {icon:"↩",label:"Reply",action:()=>setReply(msg)},
    {icon:"📋",label:"Copy text",action:()=>copyText(msg.text)},
    {icon:"📌",label:msg.pinned?"Unpin":"Pin message",action:()=>pinMessage(msg.id)},
    "---",
    ...(isMe?[
      {icon:"✏️",label:"Edit",action:()=>startEdit(msg)},
      {icon:"🗑",label:"Delete",danger:true,action:()=>deleteMsg(msg.id)},
    ]:[]),
    {icon:"🔄",label:"Forward",action:()=>addToast("Forward coming soon!","info","🔄")},
  ];
  items.forEach(item=>{
    if(item==="---"){const sep=document.createElement("div");sep.className="ctx-sep";menu.appendChild(sep);return;}
    const btn=document.createElement("button");
    btn.className="ctx-item"+(item.danger?" danger":"");
    btn.innerHTML=`<span>${item.icon}</span>${item.label}`;
    btn.onclick=()=>{item.action();hideCtxMenu();};
    menu.appendChild(btn);
  });
  const mx=Math.min(x,window.innerWidth-210);
  const my=Math.min(y,window.innerHeight-320);
  menu.style.cssText=`left:${mx}px;top:${my}px;`;
  menu.classList.remove("hidden");
  setTimeout(()=>document.addEventListener("click",hideCtxMenu,{once:true}),50);
}
function hideCtxMenu(){document.getElementById("ctx-menu").classList.add("hidden");}

/* ═══════════════════════════════════════
   MESSAGE ACTIONS
═══════════════════════════════════════ */
function addReaction(msgId,emoji){
  const msgs=messages[activeId];
  const m=msgs.find(m=>m.id===msgId);
  if(m) m.reactions[emoji]=(m.reactions[emoji]||0)+1;
  renderMessages();
}
function deleteMsg(msgId){
  const m=messages[activeId]?.find(m=>m.id===msgId);
  if(m) m.deleted=true;
  renderMessages();renderSidebar();
  addToast("Message deleted","success","🗑");
}
function pinMessage(msgId){
  const m=messages[activeId]?.find(m=>m.id===msgId);
  if(m) m.pinned=!m.pinned;
  renderMessages();
  addToast(m?.pinned?"Message pinned!":"Message unpinned","success","📌");
}
function copyText(text){
  try{navigator.clipboard.writeText(text);}catch(e){}
  addToast("Copied to clipboard","success","📋");
}
function setReply(msg){
  replyTo=msg;
  const banner=document.getElementById("reply-banner");
  const txt=document.getElementById("reply-text");
  const sender=msg.from==="me"?"You":getEntity(msg.from)?.name?.split(" ")[0]||"";
  txt.innerHTML=`<span style="color:var(--accent);font-weight:700">↩ ${sender}: </span>${msg.text}`;
  banner.classList.remove("hidden");
  document.getElementById("msg-input").focus();
}
function clearReply(){replyTo=null;document.getElementById("reply-banner").classList.add("hidden");}
function startEdit(msg){
  editingMsg=msg;
  document.getElementById("msg-input").value=msg.text;
  document.getElementById("edit-banner").classList.remove("hidden");
  document.getElementById("msg-input").focus();
  updateSendBtn();
}
function clearEdit(){editingMsg=null;document.getElementById("msg-input").value="";document.getElementById("edit-banner").classList.add("hidden");updateSendBtn();}

/* ═══════════════════════════════════════
   SEND MESSAGE
═══════════════════════════════════════ */
function sendMsg(){
  const input=document.getElementById("msg-input");
  const text=input.value.trim();
  if(!text) return;
  const now=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  if(editingMsg){
    editingMsg.text=text;editingMsg.edited=true;
    clearEdit();addToast("Message edited","success","✏️");
  } else {
    const msg={id:Date.now(),from:"me",text,time:now,reactions:{},edited:false,deleted:false,pinned:false,
      replyTo:replyTo?{from:replyTo.from,text:replyTo.text}:null,type:"text"};
    if(!messages[activeId]) messages[activeId]=[];
    messages[activeId].push(msg);
    clearReply();
    // Auto-reply
    const replies=AUTO_REPLIES[activeId]||["Got it!","👍","On it!"];
    const e=getEntity(activeId);
    if(e){
      setTimeout(()=>{
        typingMap[activeId]=true;renderHeader();renderSidebar();
        setTimeout(()=>{
          delete typingMap[activeId];
          const replyText=replies[Math.floor(Math.random()*replies.length)];
          const from=e.isGroup?e.members.filter(m=>m!=="me")[Math.floor(Math.random()*(e.members.length-1))]:activeId;
          messages[activeId].push({id:Date.now()+1,from,text:replyText,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),reactions:{},edited:false,deleted:false,pinned:false,replyTo:null,type:"text"});
          renderAll();
        },1600+Math.random()*600);
      },500);
    }
  }
  input.value="";input.style.height="auto";
  updateSendBtn();closeEmoji();closeSlashMenu();
  renderMessages();renderSidebar();
  document.getElementById("messages").scrollTop=9999999;
}

/* ═══════════════════════════════════════
   INPUT HANDLING
═══════════════════════════════════════ */
function handleInput(el){
  el.style.height="auto";
  el.style.height=Math.min(el.scrollHeight,120)+"px";
  updateSendBtn();
  const v=el.value;
  if(v.startsWith("/")){openSlashMenu(v);}else{closeSlashMenu();}
}
function handleKeyDown(ev){
  if(ev.key==="Enter"&&!ev.shiftKey){ev.preventDefault();sendMsg();}
  if(ev.key==="Escape"){clearReply();clearEdit();closeSlashMenu();}
  if(showSlash){
    const items=document.querySelectorAll(".slash-item");
    if(ev.key==="ArrowDown"){ev.preventDefault();slashSel=Math.min(slashSel+1,items.length-1);updateSlashSel(items);}
    if(ev.key==="ArrowUp"){ev.preventDefault();slashSel=Math.max(slashSel-1,0);updateSlashSel(items);}
    if(ev.key==="Enter"&&showSlash){ev.preventDefault();items[slashSel]?.click();}
  }
}
function updateSendBtn(){
  const val=document.getElementById("msg-input").value.trim();
  const btn=document.getElementById("send-btn");
  const arrow=btn.querySelector("span");
  if(val){
    btn.classList.add("ready");
    arrow.style.color="#fff";
  } else {
    btn.classList.remove("ready");
    arrow.style.color="var(--dim)";
  }
}

    const items=q?INIT_CONVS.filter(c=>getEntity(c.id)?.name.toLowerCase().includes(q.toLowerCase())):INIT_CONVS.slice(0,6);

      msgs.filter(m=>!m.deleted&&m.text?.toLowerCase().includes(q.toLowerCase())).slice(0,3).forEach(m=>results.push({convId,msg:m}));
    });
    if(results.length===0){el.innerHTML='<div style="padding:32px 16px;text-align:center;color:var(--dim);font-size:13px">No messages found</div>';return;}

      const btn=document.createElement("button");
      btn.className="sr-item";
      btn.onclick=()=>{selectConv(convId);closeSearch();};
      const av=document.createElement("div");av.appendChild(makeAv(convId,34,false));
      btn.appendChild(av);
      const info=document.createElement("div");info.style="flex:1;min-width:0;";
      const idx=msg.text.toLowerCase().indexOf(q.toLowerCase());
      let hl=msg.text;
      if(idx>=0) hl=msg.text.slice(0,idx)+`<mark style="background:rgba(124,106,247,.25);color:var(--accent);border-radius:3px">${msg.text.slice(idx,idx+q.length)}</mark>`+msg.text.slice(idx+q.length);

      btn.appendChild(info);
      const time=document.createElement("span");time.className="sr-time";time.textContent=msg.time;
      btn.appendChild(time);
      el.appendChild(btn);
    });
  }
}

  document.getElementById("pp-role").textContent=(!isGroup&&e.role)||"";
  const sc=statusColor(e.status);
  document.getElementById("pp-status").innerHTML=isGroup?`<div style="width:7px;height:7px;border-radius:50%;background:var(--accent)"></div>${e.members.length+1} members`:`<div style="width:7px;height:7px;border-radius:50%;background:${sc}"></div><span style="color:${sc}">${e.status==="online"?"Active now":e.status==="away"?"Away":"Offline"}</span>`;
  document.getElementById("pp-tz").textContent=(!isGroup&&e.timezone)?`🕐 ${e.timezone}`:"";
  const btns=document.getElementById("pp-btns");
  btns.innerHTML="";
  [["📞","Call"],["📹","Video"],["🔇","Mute"]].forEach(([icon,label])=>{
    const wrap=document.createElement("div");wrap.className="pp-btn-wrap";
    const btn=document.createElement("button");btn.className="pp-action-btn";btn.textContent=icon;
    btn.onclick=()=>addToast(`${label} coming soon!`,"info",icon);
    wrap.appendChild(btn);
    const lbl=document.createElement("div");lbl.className="pp-action-lbl";lbl.textContent=label;
    wrap.appendChild(lbl);btns.appendChild(wrap);
  });
  // Section tabs
  const tabs=[{id:"about",icon:"👤"},{id:"media",icon:"🖼"},{id:"pinned",icon:"📌"},...(isGroup?[{id:"members",icon:"👥"}]:[])];
  const tabsEl=document.getElementById("pp-sec-tabs");tabsEl.innerHTML="";
  tabs.forEach(tab=>{
    const btn=document.createElement("button");
    btn.className="pp-tab"+(ppTabState===tab.id?" active":"");
    btn.textContent=tab.icon;btn.title=tab.id;
    btn.onclick=()=>{ppTabState=tab.id;renderProfileContent();tabs.forEach((t,i)=>tabsEl.children[i].className="pp-tab"+(t.id===tab.id?" active":""));};
    tabsEl.appendChild(btn);
  });
  renderProfileContent();
}
function renderProfileContent(){
  const id=activeId;const e=getEntity(id);const isGroup=e?.isGroup;
  const content=document.getElementById("pp-content");content.innerHTML="";
  const msgs=messages[id]||[];
  if(ppTabState==="about"){
    if(!isGroup&&e.bio){
      const label=document.createElement("div");label.className="pp-section-label";label.textContent="About";content.appendChild(label);
      const bio=document.createElement("div");bio.className="pp-bio-box";bio.textContent=e.bio;content.appendChild(bio);
      content.appendChild(document.createElement("div")).style.height="14px";
    }
    if(isGroup&&e.description){
      const label=document.createElement("div");label.className="pp-section-label";label.textContent="Description";content.appendChild(label);
      const bio=document.createElement("div");bio.className="pp-bio-box";bio.textContent=e.description;content.appendChild(bio);
      content.appendChild(document.createElement("div")).style.height="14px";
    }
    const aLabel=document.createElement("div");aLabel.className="pp-section-label";aLabel.textContent="Actions";content.appendChild(aLabel);
    const aList=document.createElement("div");aList.className="pp-action-list";
    [["🔇","Mute notifications",false],["🔍","Search in chat",false],["🚫","Block user",true],["🗑","Clear chat history",true]].forEach(([icon,label,danger])=>{
      const btn=document.createElement("button");if(danger)btn.classList.add("danger");
      btn.innerHTML=`${icon} ${label}`;btn.onclick=()=>addToast(`${label} coming soon!`,danger?"error":"info");
      aList.appendChild(btn);
    });
    content.appendChild(aList);
  } else if(ppTabState==="media"){
    const grid=document.createElement("div");grid.className="media-grid";
    ["#7C6AF7","#F06292","#34D399","#FBBF24","#60A5FA","#F97316","#EC4899","#22D3EE","#A78BFA"].forEach((col,i)=>{
      const thumb=document.createElement("div");
      thumb.className="media-thumb";
      thumb.style=`background:${col}28;border:1px solid ${col}40;`;
      thumb.textContent=["🖼","📄","🎵","📊","🎬","📸","🖼","📄","🎵"][i];
      thumb.onmouseover=()=>{thumb.style.background=`${col}48`;};
      thumb.onmouseout=()=>{thumb.style.background=`${col}28`;};
      grid.appendChild(thumb);
    });
    content.appendChild(grid);
  } else if(ppTabState==="pinned"){
    const pins=msgs.filter(m=>m.pinned&&!m.deleted);
    if(pins.length===0){const empty=document.createElement("div");empty.className="empty-state";empty.innerHTML='<div class="empty-icon">📌</div>No pinned messages';content.appendChild(empty);}
    else pins.forEach(m=>{
      const item=document.createElement("div");item.className="pinned-item";
      const from=document.createElement("div");from.className="pinned-from";from.textContent=m.from==="me"?"You":getEntity(m.from)?.name||"";
      item.appendChild(from);item.appendChild(Object.assign(document.createElement("div"),{textContent:m.text}));
      content.appendChild(item);
    });
  } else if(ppTabState==="members"&&isGroup){
    const members=[...e.members.map(mid=>getEntity(mid)),ME].filter(Boolean);
    members.forEach(m=>{
      const row=document.createElement("div");row.className="member-row";
      const av=document.createElement("div");av.appendChild(makeAv(m.id||"me",34,true));row.appendChild(av);
      const info=document.createElement("div");info.style="flex:1;min-width:0;";
      const name=document.createElement("div");name.className="member-name";name.textContent=m.name+(m.id===ME.id?" (you)":"");
      const role=document.createElement("div");role.className="member-role";role.textContent=m.role||"";
      info.appendChild(name);info.appendChild(role);row.appendChild(info);
      const dot=document.createElement("div");dot.style=`width:8px;height:8px;border-radius:50%;background:${statusColor(m.status)};flex-shrink:0`;
      row.appendChild(dot);content.appendChild(row);
    });
  }
}

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
function selectConv(id){
  activeId=id;
  const conv=convs.find(c=>c.id===id);
  if(conv) conv.unread=0;
  msgSearchQ="";
  document.getElementById("msg-search-bar").classList.add("hidden");
  document.getElementById("msg-search-btn").style.display="flex";
  if(profileOpen) renderProfile();
  renderAll();
}
function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  document.getElementById("sidebar").classList.toggle("collapsed",!sidebarOpen);
  document.getElementById("toggle-sb").textContent=sidebarOpen?"◀":"▶";
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function addToast(message,type="info",icon){
  const id=++toastId;
  const container=document.getElementById("toast-container");
  const toast=document.createElement("div");
  toast.className="toast";
  const borderColor=type==="error"?"var(--busy)":type==="success"?"var(--online)":"var(--accent)";
  toast.style.borderLeft=`3px solid ${borderColor}`;
  toast.innerHTML=`<span style="font-size:18px;flex-shrink:0">${icon||"💬"}</span><span style="flex:1;font-size:13px">${message}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(toast);
  setTimeout(()=>toast.remove(),3600);
}

/* ═══════════════════════════════════════
   SIMULATE TYPING
═══════════════════════════════════════ */
function startTypingSimulation(){
  USERS.filter(u=>u.status==="online").forEach((u,idx)=>{
    setTimeout(()=>{
      typingMap[u.id]=true;
      if(activeId===u.id){renderHeader();renderMessages();}
      renderSidebar();
      setTimeout(()=>{
        delete typingMap[u.id];
        if(activeId===u.id){renderHeader();renderMessages();}
        renderSidebar();
      },2200+idx*200);
    },5000+idx*2500);
  });
}

/* ═══════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════ */
function renderAll(){
  renderSidebar();renderHeader();renderMessages();
  if(profileOpen) renderProfile();
}

/* ═══════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════ */
document.addEventListener("keydown",(e)=>{
  if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();openSearch();}
  if(e.key==="Escape"){
    closeSearch();closeEmoji();closeSlashMenu();
    const modal=document.getElementById("search-modal");
    if(!modal.classList.contains("hidden")) closeSearch();
  }
});

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
applyTheme("midnight");
renderThemeMenu();
renderAll();
startTypingSimulation();
addToast("Welcome to Nexus! ✦ Try ⌘K to search","success","✦");
</script>
</body>
